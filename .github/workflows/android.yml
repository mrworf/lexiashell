name: Android CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  JAVA_HOME: ${{ github.workspace }}/.jdk/temurin-17
  ANDROID_HOME: ${{ github.workspace }}/.android-sdk
  ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk

jobs:
  validate:
    name: Build, Lint, And Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Bootstrap Android tooling
        run: scripts/bootstrap_android_tooling.sh

      - name: Build, lint, and unit test
        run: ./gradlew :app:assembleDebug :app:lintDebug :app:testDebugUnitTest

      - name: Report resolved GeckoView dependency
        run: ./gradlew :app:dependencies --configuration debugRuntimeClasspath

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Bootstrap Android tooling
        run: scripts/bootstrap_android_tooling.sh

      - name: Build release APK and bundle
        run: ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/release/*arm64-v8a*release*.apk release-assets/lexia-shell-${GITHUB_REF_NAME}-arm64-v8a.apk
          cp app/build/outputs/bundle/release/*.aab release-assets/lexia-shell-${GITHUB_REF_NAME}.aab
          (cd release-assets && sha256sum * > SHA256SUMS.txt)

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Lexia Shell $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
